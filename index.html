<!DOCTYPE html>
<html>

<head>
    <title>Geospatial Mashup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map {
            width: 100%;
            height: 700px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
<script>
    var mymap = L.map('map').setView([-1.90, 101.35], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(mymap);

    // --- Polygon ---
    var polygon = L.polygon([
        [-1.7609277114897832, 101.29417004522963],
        [-1.7683434232720892, 101.26322125598122],
        [-1.780844127420547, 101.23121257669004],
        [-1.8300562587327605, 101.26073652746271],
        [-1.8396251322538433, 101.25642264000889],
        [-1.8382491952601017, 101.2742638737941],
        [-1.8169350518553502, 101.27341511806364],
        [-1.8093000732122926, 101.27511262982256],
        [-1.8089819485179486, 101.29028414066147],
        [-1.8042100699617027, 101.30078749430612],
        [-1.7972112921099457, 101.29877169916217],
        [-1.796362953575744, 101.2863586448549],
        [-1.7893641456543614, 101.28423675522971],
        [-1.7857586887195225, 101.27871984220425],
        [-1.7808807063160679, 101.2793564090918],
        [-1.76744810912706, 101.29894626093763]
    ], {
        color: '#006400',
        fillColor: '#32CD32',
        fillOpacity: 0.4
    }).addTo(mymap);

    polygon.bindPopup('<b>Perkebunan Teh Kayu Aro</b>');

    // --- Marker (TN Kerinci Seblat) ---
    var marker = L.marker([-1.6945781172401888, 101.27099317135249]).addTo(mymap);
    marker.bindPopup('<b>Gunung Kerinci</b>');
    var marker2 = L.marker([-2.0909965725191975, 101.46283165061449]).addTo(mymap);
    marker2.bindPopup('<b>Bandara Depati Parbo</b>');
    var marker3 = L.marker([-1.671996942206745, 101.41513127372839]).addTo(mymap);
    marker3.bindPopup('<b>Gunung Tujuh</b>');

    // --- Circle ---
    var circle = L.circle([-1.697, 101.264], {
        color: '#0000FF',
        fillColor: '#1E90FF',
        fillOpacity: 0.5,
        radius: 7000   // diperbesar (7 km)
    }).addTo(mymap);

    circle.bindPopup('<b>Radius 7 km dari Gunung</b>');
    var polyline = L.polyline([
        [-1.694495137807083, 101.34593396312022],
        [-1.7036028519582642, 101.3451901492342],
        [-1.6967256023844215, 101.3444463353482],
        [-1.7041604657138718, 101.3448182422912],
        [-1.7075906356815693, 101.34187059244692],
        [-1.718929364161027, 101.34595708572877],
        [-1.7830770982586774, 101.27213175360663],
        [-1.8065554522359135, 101.27171229149391],
        [-1.8124249934708152, 101.26625928402845],
        [-1.830452750888943, 101.26416197346481],
        [-1.8401616510477377, 101.25925347532241],
        [-1.89653654303343, 101.29994740669049],
        [-1.9075576493886757, 101.29985841883168],
        [-1.987023153962803, 101.37501872818761],
        [-1.999585993100786, 101.37754403731896],
        [-2.0351695104224836, 101.38505459069287],
        [-2.050181072316758, 101.3908961321839],
        [-2.066219467366121, 101.3991658815801],
        [-2.0717119037344944, 101.40757703677252],
        [-2.0737984216252476, 101.42619400227457],
        [-2.075015555791085, 101.42828188625612],
        [-2.088584985048047, 101.45978710573112],
        [-2.104532381517664, 101.46936783297893],
        [-2.1073873137074792, 101.48708037601527],
        [-2.1039613944521727, 101.4885088069053],
        [-2.103427246908735, 101.48854961344027],
        [-2.120577801990908, 101.52235024273293]
    ], {
        color: '#FF0000',
        weight: 3,
        opacity: 0.9
    }).addTo(mymap);

    polyline.bindPopup('Jalur utama akses Gunung Kerinci ke Danau Kerinci');
    </script>
</body>

</html>
